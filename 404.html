<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Bhargav Hari</title>
<meta name="robots" content="noindex">
<style>
:root{--bg:#F0F5F7;--ink:#0C1116;--muted:#6E7981}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden}
.big{font-size:clamp(120px,32vw,420px);font-weight:800;letter-spacing:-.06em;line-height:.85;color:var(--ink);opacity:.08;position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;user-select:none}
h1{font-size:clamp(1.6rem,4.5vw,2.8rem);font-weight:700;letter-spacing:-.045em}
p{color:var(--muted);margin:14px 0 30px;font-size:1rem}
a{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:#F0F5F7;text-decoration:none;border-radius:999px;padding:14px 26px;font-size:.75rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;transition:transform .25s cubic-bezier(.23,1,.32,1)}
a:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="big" aria-hidden="true">404</div>
<h1>This page did not survive the analysis.</h1>
<p>The link is dead stock — let me route you back to the work.</p>
<a href="/">Back to the portfolio →</a>
</body>
</html>
